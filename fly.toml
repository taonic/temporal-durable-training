# fly.toml — the launcher machine. It stays tiny: the actual demo stack
# (Temporal + worker + dashboard) runs in per-visitor Daytona sandboxes.
#
# Before first deploy:
#   fly secrets set DAYTONA_KEY=...
#   fly secrets set SANDBOX_IMAGE=registry.example.com/durable-training-sandbox:latest
#
# (Build + push the sandbox image from deploy/sandbox/Dockerfile to a registry
#  Daytona can pull — see DEPLOY.md.)

app = "durable-training"
primary_region = "sjc"

[build]
  dockerfile = "deploy/launcher/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
