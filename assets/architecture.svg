<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
    <style>
      .box     { rx: 14; ry: 14; stroke-width: 2; }
      .wf      { fill: #EEF2FF; stroke: #6366F1; }
      .pool    { fill: #ECFEFF; stroke: #06B6D4; }
      .act     { fill: #F8FAFC; stroke: #94A3B8; }
      .ok      { fill: #ECFDF5; stroke: #10B981; }
      .dead    { fill: #FEF2F2; stroke: #EF4444; stroke-dasharray: 7 5; }
      .ckpt    { fill: #FFFBEB; stroke: #F59E0B; }
      .title   { font-size: 17px; font-weight: 700; fill: #1E293B; }
      .titlep  { font-size: 17px; font-weight: 700; fill: #0E7490; }
      .titleok { font-size: 16px; font-weight: 700; fill: #047857; }
      .titledd { font-size: 16px; font-weight: 700; fill: #B91C1C; }
      .titleck { font-size: 15px; font-weight: 700; fill: #B45309; }
      .sub     { font-size: 12.5px; fill: #475569; }
      .edge    { stroke: #475569; stroke-width: 2; fill: none; }
      .edgered { stroke: #DC2626; stroke-width: 2; fill: none; }
      .edgelbl { font-size: 12px; font-weight: 600; fill: #475569; }
      .reslbl  { font-size: 12px; font-weight: 700; fill: #DC2626; }
      .mono    { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #334155; }
      .region  { font-size: 12px; font-weight: 700; fill: #94A3B8; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- ============ orchestration row ============ -->
  <!-- SweepWorkflow -->
  <rect class="box wf" x="30" y="40" width="240" height="112"/>
  <text class="title" x="150" y="78"  text-anchor="middle">SweepWorkflow</text>
  <text class="sub"   x="150" y="104" text-anchor="middle">grid +</text>
  <text class="sub"   x="150" y="122" text-anchor="middle">approval gate</text>

  <!-- TrainingWorkflow × N -->
  <rect class="box wf" x="370" y="40" width="240" height="112"/>
  <text class="title" x="490" y="76"  text-anchor="middle">TrainingWorkflow × N</text>
  <text class="sub"   x="490" y="102" text-anchor="middle">epoch loop · checkpoints</text>
  <text class="sub"   x="490" y="120" text-anchor="middle">early-stop · HITL pause</text>

  <!-- GpuPoolWorkflow -->
  <rect class="box pool" x="710" y="40" width="240" height="112"/>
  <text class="titlep" x="830" y="78"  text-anchor="middle">GpuPoolWorkflow</text>
  <text class="sub"    x="830" y="104" text-anchor="middle">durable semaphore</text>
  <text class="sub"    x="830" y="122" text-anchor="middle">over the GPUs</text>

  <line class="edge" x1="270" y1="96" x2="364" y2="96" marker-end="url(#arrow)"/>
  <text class="edgelbl" x="317" y="88" text-anchor="middle">fan out</text>

  <line class="edge" x1="610" y1="96" x2="704" y2="96" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text class="edgelbl" x="660" y="84"  text-anchor="middle">acquire /</text>
  <text class="edgelbl" x="660" y="116" text-anchor="middle">release</text>

  <!-- ============ activities ============ -->
  <line class="edge" x1="490" y1="152" x2="490" y2="222" marker-end="url(#arrow)"/>

  <rect class="box act" x="170" y="222" width="640" height="82"/>
  <text class="title" x="490" y="252" text-anchor="middle" font-size="14">activities</text>
  <text class="mono"  x="490" y="276" text-anchor="middle">prepare_data · train_epoch (heartbeat) · evaluate</text>
  <text class="mono"  x="490" y="294" text-anchor="middle">register_model · acquire/release_gpu</text>

  <!-- retry-in-place self loop on the activity -->
  <path class="edgered" d="M380,222 C380,196 460,196 460,222" marker-end="url(#arrowRed)"/>
  <text class="reslbl" x="420" y="190" text-anchor="middle">epoch raises → retry → resume from checkpoint</text>

  <!-- ============ resiliency / worker pool ============ -->
  <line class="edge" x1="490" y1="304" x2="490" y2="372" marker-end="url(#arrow)"/>
  <text class="edgelbl" x="565" y="345" text-anchor="middle">scheduled onto a worker</text>

  <text class="region" x="282" y="368" text-anchor="start">WORKER POOL — FAULT TOLERANCE</text>
  <rect class="box" x="270" y="376" width="450" height="168" rx="14" ry="14" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- healthy worker -->
  <rect class="box ok" x="300" y="408" width="180" height="104"/>
  <text class="titleok" x="390" y="446" text-anchor="middle">Worker 1 ✓</text>
  <text class="sub"     x="390" y="470" text-anchor="middle">healthy</text>
  <text class="sub"     x="390" y="488" text-anchor="middle">picks up &amp; resumes</text>

  <!-- failed worker -->
  <rect class="box dead" x="510" y="408" width="180" height="104"/>
  <text class="titledd" x="600" y="446" text-anchor="middle">Worker 2 ✕</text>
  <text class="sub"     x="600" y="470" text-anchor="middle">node vanished</text>
  <text class="sub"     x="600" y="488" text-anchor="middle">(no heartbeats)</text>

  <!-- reschedule from dead worker to healthy one -->
  <path class="edgered" d="M600,408 C600,388 390,388 390,408" marker-end="url(#arrowRed)"/>
  <text class="reslbl" x="495" y="382" text-anchor="middle">reschedule after heartbeat_timeout</text>

  <!-- durable checkpoint store -->
  <path class="ckpt box" d="M752,420 v76 a78,13 0 0 0 156,0 v-76" stroke-width="2"/>
  <ellipse class="ckpt" cx="830" cy="420" rx="78" ry="13" stroke-width="2"/>
  <text class="titleck" x="830" y="462" text-anchor="middle">checkpoints</text>
  <text class="sub"     x="830" y="482" text-anchor="middle">durable state</text>

  <!-- workers read/write checkpoints; survivor resumes from last one -->
  <line class="edge" x1="722" y1="460" x2="750" y2="460" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text class="reslbl" x="830" y="534" text-anchor="middle">survivor resumes from last checkpoint</text>
</svg>
